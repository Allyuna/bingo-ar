<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Bingo Secret — Studio La Milie</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800&display=swap" rel="stylesheet" />
  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/"
  } }
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Poppins', Arial, sans-serif; -webkit-tap-highlight-color: transparent; }

    /* ── AR layer ── */
    #ar-container { position: fixed; inset: 0; }
    #ar-container video  { position: absolute!important; inset: 0!important; width: 100%!important; height: 100%!important; object-fit: cover!important; z-index: 0; }
    #ar-container canvas { position: absolute!important; inset: 0!important; width: 100%!important; height: 100%!important; z-index: 1; }

    /* ── Splash ── */
    #splash {
      position: fixed; inset: 0; z-index: 500;
      background: #0d0d1a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 22px; padding: 40px 28px; color: #fff; text-align: center;
    }

    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; pointer-events: none; }
    .orb-blue { width: 380px; height: 380px; background: #5BB3E0; top: -120px; right: -120px; }
    .orb-pink  { width: 320px; height: 320px; background: #D96BA8; bottom: 0; left: -80px; }

    .logo-wrap {
      width: 96px; height: 96px; background: #fff; border-radius: 22px;
      display: flex; align-items: center; justify-content: center; padding: 9px;
      box-shadow: 0 0 30px rgba(91,179,224,.35), 0 0 70px rgba(217,107,168,.2);
      animation: float 4s ease-in-out infinite;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    .s-label { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,.38); }
    .s-title  { font-size: 44px; font-weight: 800; line-height: 1.05; background: linear-gradient(135deg,#7ECEF4,#E87DB5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .divider { width: 44px; height: 3px; background: linear-gradient(90deg,#5BB3E0,#D96BA8); border-radius: 2px; }

    .info-card {
      background: rgba(255,255,255,.06); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.1); border-radius: 20px;
      padding: 18px 22px; max-width: 300px; width: 100%;
    }
    .info-icon { font-size: 26px; margin-bottom: 8px; }
    .info-text { font-size: 14px; font-weight: 500; color: rgba(255,255,255,.8); line-height: 1.65; }
    .info-text strong { background: linear-gradient(135deg,#7ECEF4,#E87DB5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    #start-btn {
      padding: 17px 40px; max-width: 280px; width: 100%;
      background: linear-gradient(135deg,#5BB3E0,#D96BA8);
      color: #fff; font-family: 'Poppins',Arial,sans-serif; font-size: 16px; font-weight: 700;
      border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 28px rgba(91,179,224,.4);
      animation: btnpulse 2.2s ease-in-out infinite;
      transition: transform .1s, opacity .2s;
    }
    #start-btn:disabled { opacity: .5; animation: none; }
    #start-btn:active { transform: scale(0.97); }
    @keyframes btnpulse { 0%,100%{box-shadow:0 4px 28px rgba(91,179,224,.4)} 50%{box-shadow:0 6px 40px rgba(217,107,168,.55)} }

    .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,.12); border-top-color: #5BB3E0; border-radius: 50%; animation: spin .8s linear infinite; display: none; }
    @keyframes spin { to{transform:rotate(360deg)} }
    #status-line { font-size: 12px; color: rgba(255,255,255,.4); min-height: 16px; }
    #status-line.err { color: #ff6b6b; }

    /* ── HUD (shown once camera is live) ── */
    #hud {
      position: fixed; inset: 0; z-index: 200;
      display: none; flex-direction: column; align-items: center; justify-content: space-between;
      pointer-events: none;
      padding: max(env(safe-area-inset-top),48px) 20px max(env(safe-area-inset-bottom),32px);
    }
    #hud.on { display: flex; }

    /* Top bar */
    .hud-top { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; pointer-events: all; }
    .hud-logo { width: 34px; height: 34px; border-radius: 8px; background: #fff; padding: 3px; }
    .hud-logo img { width: 100%; height: 100%; object-fit: contain; }
    .hud-title { font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,.7); text-shadow: 0 1px 6px rgba(0,0,0,.8); }

    /* Viewfinder */
    .hud-mid { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    #vf { position: relative; width: 176px; height: 176px; }
    .co { position: absolute; width: 26px; height: 26px; }
    .tl { top:0;left:0;  border-top:3px solid #7ECEF4;border-left:3px solid #7ECEF4;  border-radius:3px 0 0 0; }
    .tr { top:0;right:0; border-top:3px solid #E87DB5;border-right:3px solid #E87DB5; border-radius:0 3px 0 0; }
    .bl { bottom:0;left:0;  border-bottom:3px solid #E87DB5;border-left:3px solid #E87DB5; border-radius:0 0 0 3px; }
    .br { bottom:0;right:0; border-bottom:3px solid #7ECEF4;border-right:3px solid #7ECEF4; border-radius:0 0 3px 0; }
    #sl { position:absolute;left:5px;right:5px;height:2px;background:linear-gradient(90deg,transparent,#7ECEF4 40%,#E87DB5 60%,transparent);box-shadow:0 0 7px rgba(126,206,244,.9);animation:sweep 2.2s ease-in-out infinite; }
    @keyframes sweep { 0%{top:0;opacity:1}85%{top:100%;opacity:.35}100%{top:100%;opacity:0} }
    #hint-text { background:rgba(0,0,0,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:13px;font-weight:500;padding:9px 18px;border-radius:14px;text-align:center;line-height:1.5; }

    /* ── Error overlay ── */
    #err { display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.92);flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:36px;text-align:center;color:#fff; }
    #err.on { display:flex; }
    #err h2 { font-size:19px;font-weight:700; }
    #err p  { font-size:13px;color:rgba(255,255,255,.6);max-width:280px;line-height:1.65; }
    #err button { padding:11px 28px;background:linear-gradient(135deg,#5BB3E0,#D96BA8);border:none;border-radius:50px;color:#fff;font-family:'Poppins',Arial,sans-serif;font-size:14px;font-weight:600;cursor:pointer; }
  </style>
</head>
<body>

<div id="ar-container"></div>

<!-- HUD (visible while camera is live) -->
<div id="hud">
  <div class="hud-top">
    <div class="hud-logo"><img src="logo.jpg" alt="" /></div>
    <div class="hud-title">Bingo Secret</div>
  </div>
  <div class="hud-mid">
    <div id="vf">
      <div class="co tl"></div><div class="co tr"></div>
      <div class="co bl"></div><div class="co br"></div>
      <div id="sl"></div>
    </div>
    <div id="hint-text">📷 Pointez vers l'un de vos symboles</div>
  </div>
  <div></div><!-- spacer -->
</div>

<!-- Splash (shown before camera starts) -->
<div id="splash">
  <div class="orb orb-blue"></div>
  <div class="orb orb-pink"></div>

  <div class="logo-wrap">
    <img src="logo.jpg" alt="Studio La Milie" />
  </div>
  <div>
    <div class="s-label">Studio La Milie &bull; Lyon</div>
    <h1 class="s-title">BINGO<br/>SECRET</h1>
  </div>
  <div class="divider"></div>
  <div class="info-card">
    <div class="info-icon">🎯</div>
    <p class="info-text">
      Pointez votre caméra vers <strong>n'importe quel symbole</strong> sur votre carte de bingo pour révéler le code secret !
    </p>
  </div>
  <button id="start-btn" onclick="startAR()">📷 &nbsp;Lancer la caméra</button>
  <div class="spinner" id="spinner"></div>
  <div id="status-line"></div>
</div>

<!-- Error overlay -->
<div id="err">
  <h2 id="err-title">⚠️ Erreur</h2>
  <p id="err-msg">Une erreur est survenue.</p>
  <button onclick="location.reload()">Réessayer</button>
</div>

<!--
  MARKERS indexed 0–11 must match the compilation order of targets.mind.
  Compile order: Cerceau, Tissu, Pole, Spirale, Étoile, Éclair,
  Projecteur, Ticket, Note, Applaudissements, Clé, Cadenas.
-->
<script type="module">
// Preload libraries immediately — by the time the button is pressed they'll be ready
const _libs = Promise.all([
  import('https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js'),
  import('three')
]).then(([m, THREE]) => ({
  MindARThree: m.MindARThree ?? m.default?.MindARThree ?? m.default,
  THREE
})).catch(e => ({ error: e }));

// Index 0–11 must match the compilation order of targets.mind
const MARKERS = [
  { code: '2847', name: 'Cerceau Aérien'   },
  { code: '5193', name: 'Tissu Aérien'     },
  { code: '7362', name: 'Pole Dance'       },
  { code: '4918', name: 'Spirale'          },
  { code: '8531', name: 'Étoile'           },
  { code: '3274', name: 'Éclair'           },
  { code: '6489', name: 'Projecteur'       },
  { code: '1756', name: 'Ticket'           },
  { code: '9023', name: 'Note de Musique'  },
  { code: '5847', name: 'Applaudissements' },
  { code: '3691', name: 'Clé'              },
  { code: '7248', name: 'Cadenas'          },
];

function setStatus(msg, isErr) {
  const el = document.getElementById('status-line');
  el.textContent = msg;
  el.className = isErr ? 'err' : '';
}

function showError(title, msg) {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('err').classList.add('on');
}

// Draw the holographic code display with slot-machine digit reveal
function drawCode(ctx, digits, elapsed) {
  const W = 512, H = 512;
  ctx.clearRect(0, 0, W, H);

  // Dark radial background
  const bg = ctx.createRadialGradient(W/2, H/2, 10, W/2, H/2, 240);
  bg.addColorStop(0, 'rgba(18,6,46,0.97)');
  bg.addColorStop(0.65, 'rgba(8,4,28,0.96)');
  bg.addColorStop(1, 'rgba(4,2,14,0.88)');
  ctx.beginPath(); ctx.arc(W/2, H/2, 240, 0, Math.PI*2);
  ctx.fillStyle = bg; ctx.fill();

  // Outer glow ring
  ctx.save();
  ctx.beginPath(); ctx.arc(W/2, H/2, 238, 0, Math.PI*2);
  ctx.strokeStyle = '#7ECEF4'; ctx.lineWidth = 3;
  ctx.shadowColor = '#7ECEF4'; ctx.shadowBlur = 28;
  ctx.stroke(); ctx.restore();

  // Inner pink ring
  ctx.save();
  ctx.beginPath(); ctx.arc(W/2, H/2, 218, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(232,125,181,0.22)'; ctx.lineWidth = 1;
  ctx.stroke(); ctx.restore();

  // Label
  ctx.save();
  ctx.font = '700 22px Arial,sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(126,206,244,0.9)';
  ctx.shadowColor = '#7ECEF4'; ctx.shadowBlur = 10;
  ctx.fillText('✦  CODE SECRET  ✦', W/2, 148); ctx.restore();

  // Divider lines
  [[175, 'rgba(126,206,244,0.25)'], [H - 148, 'rgba(232,125,181,0.25)']].forEach(([y, color]) => {
    const dx = Math.sqrt(Math.max(0, 190*190 - (y - H/2)*(y - H/2)));
    ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(W/2-dx, y); ctx.lineTo(W/2+dx, y); ctx.stroke(); ctx.restore();
  });

  // Digits — slot machine reveal
  const LOCK_TIMES = [300, 540, 780, 1020];
  const SPACING = 104;
  const startX = W/2 - SPACING * 1.5;
  const cy = H/2 + 16;
  ctx.font = '800 128px Arial,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  digits.forEach((final, i) => {
    const locked = elapsed >= LOCK_TIMES[i];
    const spinning = !locked && elapsed > 60;
    const d = spinning ? String(Math.floor((elapsed * (14 + i*5) / 1000 + i*7) % 10)) : final;
    ctx.save();
    if (locked) {
      const g = ctx.createLinearGradient(0, cy-64, 0, cy+64);
      g.addColorStop(0, '#FFFFFF'); g.addColorStop(0.45, '#F4F0FF'); g.addColorStop(1, '#E87DB5');
      ctx.fillStyle = g; ctx.shadowColor = '#E87DB5'; ctx.shadowBlur = 32;
    } else {
      const flicker = 0.38 + 0.28 * Math.abs(Math.sin(elapsed * 0.011 + i * 1.8));
      ctx.fillStyle = `rgba(126,206,244,${flicker})`; ctx.shadowColor = '#7ECEF4'; ctx.shadowBlur = 14;
    }
    ctx.fillText(d, startX + i * SPACING, cy); ctx.restore();
  });

  // Hint
  ctx.save();
  ctx.font = '500 17px Arial,sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText('Note-le sur ta case ! 📝', W/2, H - 122); ctx.restore();
}

let mindarThree = null;

async function startAR() {
  const btn = document.getElementById('start-btn');
  btn.disabled = true;
  document.getElementById('spinner').style.display = 'block';
  setStatus('Chargement…');

  const libs = await _libs;
  if (libs.error || !libs.MindARThree) {
    showError('⚠️ Librairie AR manquante', 'Erreur : ' + (libs.error?.message || 'MindARThree introuvable'));
    return;
  }
  const { MindARThree, THREE } = libs;

  setStatus('Initialisation…');
  try {
    mindarThree = new MindARThree({
      container: document.getElementById('ar-container'),
      imageTargetSrc: 'targets.mind',
      maxTrack: MARKERS.length,
      uiLoading: 'no', uiScanning: 'no', uiError: 'no',
    });

    const { renderer, scene, camera } = mindarThree;
    renderer.setClearColor(0x000000, 0);
    renderer.toneMapping = THREE.NoToneMapping;
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));

    const anchorState = [];

    // Shared paint splat textures — graffiti palette
    const SPLAT_COLORS = ['#E87DB5','#7ECEF4','#FF8C3A','#FFFFFF','#CC2288','#44DDFF'];
    const splatTextures = SPLAT_COLORS.map(hex => {
      const sc = document.createElement('canvas'); sc.width = 64; sc.height = 64;
      const sx = sc.getContext('2d');
      // Main blob
      sx.beginPath(); sx.arc(32, 32, 26, 0, Math.PI*2); sx.fillStyle = hex; sx.fill();
      // Small satellite drops for paint-splat feel
      [[52,14,7],[14,50,6],[54,48,5],[10,18,5]].forEach(([x,y,r]) => {
        sx.beginPath(); sx.arc(x,y,r,0,Math.PI*2); sx.fill();
      });
      return new THREE.CanvasTexture(sc);
    });

    function makeSplat(idx) {
      const mat = new THREE.SpriteMaterial({ map: splatTextures[idx % splatTextures.length], transparent: true });
      const s = new THREE.Sprite(mat);
      s.visible = false;
      s.userData = { mat, vx:0, vy:0, vz:0, life:0, maxLife:1, sz:0.05 };
      return s;
    }

    function burstSplats(splats) {
      splats.forEach((s, i) => {
        const angle = (i / splats.length) * Math.PI * 2 + Math.random() * 0.8;
        const speed = 0.18 + Math.random() * 0.32;
        s.position.set(0, 0.05, 0);
        s.visible = true;
        const u = s.userData;
        u.vx = Math.cos(angle) * speed;
        u.vy = 0.25 + Math.random() * 0.35;
        u.vz = Math.sin(angle) * speed;
        u.life = 0;
        u.maxLife = 1.2 + Math.random() * 0.8;
        u.sz = 0.035 + Math.random() * 0.055;
        u.mat.opacity = 1;
        u.mat.rotation = Math.random() * Math.PI * 2;
        u.rotSpeed = (Math.random() - 0.5) * 4;
      });
    }

    MARKERS.forEach((marker, idx) => {
      // Canvas sprite (always faces camera)
      const cv = document.createElement('canvas');
      cv.width = 512; cv.height = 512;
      const ctx2d = cv.getContext('2d');
      const tex = new THREE.CanvasTexture(cv);
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
      sprite.scale.set(0, 0, 0);
      sprite.position.set(0, 0.32, 0);

      // Paint splats — 18 droplets per anchor
      const splats = Array.from({ length: 18 }, (_, i) => makeSplat(i));

      const anchor = mindarThree.addAnchor(idx);
      anchor.group.add(sprite);
      splats.forEach(s => anchor.group.add(s));

      const state = { trackStart: null, lastBurst: 0, sprite, splats, cv, ctx2d, tex, digits: marker.code.split(''), allLocked: false };
      anchorState.push(state);

      anchor.onTargetFound = () => {
        state.trackStart = Date.now();
        state.lastBurst = Date.now();
        state.allLocked = false;
        burstSplats(state.splats);
        document.getElementById('hint-text').textContent = '🎯 ' + marker.name;
      };
      anchor.onTargetLost = () => {
        state.trackStart = null;
        sprite.scale.set(0,0,0);
        state.splats.forEach(s => { s.visible = false; });
        document.getElementById('hint-text').textContent = '📷 Pointez vers l\'un de vos symboles';
      };
    });

    setStatus('Ouverture de la caméra…');
    await mindarThree.start();
    document.getElementById('splash').style.display = 'none';
    document.getElementById('hud').classList.add('on');

    let lastT = 0;
    renderer.setAnimationLoop(() => {
      const t = Date.now();
      const dt = lastT ? Math.min((t - lastT) / 1000, 0.05) : 0.016;
      lastT = t;

      anchorState.forEach(state => {
        const { trackStart, sprite, splats, ctx2d, tex, digits } = state;
        if (trackStart === null) return;
        const elapsed = t - trackStart;

        // Sprite scale-in + float
        const s = 1 - Math.pow(1 - Math.min(1, elapsed / 550), 3);
        const ss = s * 0.50;
        sprite.scale.set(ss, ss, ss);
        sprite.position.y = 0.30 + Math.sin(t * 0.0018) * 0.014;

        // Repeat burst every 2.8s
        if (elapsed > 400 && t - state.lastBurst > 2800) {
          state.lastBurst = t;
          burstSplats(splats);
        }

        // Paint splat physics
        splats.forEach(s => {
          if (!s.visible) return;
          const u = s.userData;
          u.life += dt;
          const ratio = u.life / u.maxLife;
          if (ratio >= 1) { s.visible = false; return; }
          s.position.x += u.vx * dt;
          s.position.y += u.vy * dt;
          s.position.z += u.vz * dt;
          u.vy -= 0.35 * dt; // gravity
          u.mat.rotation += u.rotSpeed * dt;
          // Pop in, then fade out in last 30%
          const pop = Math.min(1, ratio * 8);
          const fade = ratio > 0.7 ? 1 - (ratio - 0.7) / 0.3 : 1;
          u.mat.opacity = fade;
          s.scale.setScalar(u.sz * pop);
        });

        // Canvas slot machine
        if (!state.allLocked) {
          drawCode(ctx2d, digits, elapsed);
          tex.needsUpdate = true;
          if (elapsed > 1150) {
            state.allLocked = true;
            drawCode(ctx2d, digits, 2000);
            tex.needsUpdate = true;
          }
        }
      });
      renderer.render(scene, camera);
    });

  } catch(e) {
    console.error('AR error:', e);
    const msg = (e?.message || '').toLowerCase();
    if (msg.includes('permission') || msg.includes('denied') || msg.includes('notallowed'))
      showError('📷 Accès caméra refusé', 'Autorisez la caméra dans les réglages puis rechargez.');
    else if (msg.includes('notfound') || msg.includes('devicenotfound'))
      showError('📷 Caméra introuvable', 'Aucune caméra détectée.');
    else
      showError('⚠️ Erreur (' + (e?.name||'?') + ')', e?.message || String(e));
  }
}

// Expose to button onclick
window.startAR = startAR;

window.addEventListener('beforeunload', () => {
  if (mindarThree) try { mindarThree.stop(); } catch(_) {}
});
</script>
</body>
</html>
